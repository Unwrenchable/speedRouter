services:
  speedrouter:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Set SECRET_KEY to a stable value so sessions survive container restarts.
      # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: "${SECRET_KEY:-}"
      # Override Gunicorn worker count (default: 2). Formula: 2 * CPU_count + 1
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
    restart: unless-stopped
